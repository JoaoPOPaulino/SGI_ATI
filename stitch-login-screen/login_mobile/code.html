<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PatriMove - Authorize Access</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-error": "#ffffff",
              "surface-container-low": "#f2f4f6",
              "on-secondary-fixed": "#001f2a",
              "surface-container-high": "#e6e8ea",
              "on-secondary-container": "#4a6774",
              "on-surface-variant": "#43474f",
              "on-tertiary-container": "#84d67f",
              "on-tertiary-fixed-variant": "#005312",
              "inverse-on-surface": "#eff1f3",
              "secondary-fixed-dim": "#adcbda",
              "error": "#ba1a1a",
              "tertiary-container": "#035e17",
              "on-primary-container": "#a5c5fe",
              "on-error-container": "#93000a",
              "primary-fixed": "#d6e3ff",
              "on-primary-fixed-variant": "#254778",
              "inverse-surface": "#2d3133",
              "tertiary-fixed-dim": "#88d982",
              "surface": "#f7f9fb",
              "on-background": "#191c1e",
              "on-surface": "#191c1e",
              "surface-dim": "#d8dadc",
              "secondary-container": "#c6e4f4",
              "secondary-fixed": "#c9e7f7",
              "on-primary-fixed": "#001b3d",
              "surface-variant": "#e0e3e5",
              "inverse-primary": "#a9c7ff",
              "primary-fixed-dim": "#a9c7ff",
              "secondary": "#466270",
              "background": "#f7f9fb",
              "error-container": "#ffdad6",
              "outline": "#737780",
              "on-tertiary": "#ffffff",
              "surface-container-highest": "#e0e3e5",
              "on-secondary": "#ffffff",
              "on-primary": "#ffffff",
              "surface-container": "#eceef0",
              "tertiary": "#00440d",
              "surface-tint": "#3f5f92",
              "surface-bright": "#f7f9fb",
              "outline-variant": "#c3c6d0",
              "tertiary-fixed": "#a3f69c",
              "primary": "#153a6b",
              "on-tertiary-fixed": "#002204",
              "primary-container": "#315183",
              "surface-container-lowest": "#ffffff",
              "on-secondary-fixed-variant": "#2e4b57"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-gradient-primary {
            background: linear-gradient(135deg, #153a6b 0%, #315183 100%);
        }
        .glass-panel {
            background: rgba(224, 227, 229, 0.8);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center justify-center p-6 selection:bg-primary-fixed selection:text-on-primary-fixed">
<div class="w-full max-w-sm flex flex-col items-center space-y-12">
<header class="flex flex-col items-center text-center">
<div class="mb-4">
<span class="text-primary font-black tracking-tighter text-4xl font-headline">PatriMove</span>
</div>
<div class="space-y-2">
<h1 class="text-on-surface font-headline font-bold text-2xl tracking-tight">Authorize Access</h1>
<p class="text-on-surface-variant text-sm px-4">Secure environment for enterprise asset management and tactical inventory control.</p>
</div>
</header>
<main class="w-full space-y-6">
<div class="bg-surface-container-lowest p-8 rounded-xl shadow-[0_16px_32px_-12px_rgba(25,28,30,0.06)] border border-outline-variant/10">
<form class="space-y-5">
<div class="space-y-1.5">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant ml-1" for="email">Corporate Email</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-md px-4 py-3.5 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:bg-surface-container-high transition-all duration-200 outline-none" id="email" placeholder="name@company.com" type="email"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline text-lg" data-icon="alternate_email">alternate_email</span>
</div>
</div>
<div class="space-y-1.5">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant ml-1" for="key">Security Key</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-md px-4 py-3.5 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:bg-surface-container-high transition-all duration-200 outline-none" id="key" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline text-lg" data-icon="vpn_key">vpn_key</span>
</div>
</div>
<div class="pt-4 flex flex-col space-y-3">
<button class="w-full bg-gradient-primary text-on-primary font-bold py-4 rounded-md shadow-sm active:scale-[0.98] transition-all flex items-center justify-center space-x-2" type="submit">
<span>Authorize Access</span>
<span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
<button class="w-full bg-transparent text-primary font-bold py-3.5 rounded-md hover:bg-surface-container-low active:bg-surface-container-high transition-colors flex items-center justify-center space-x-2 border border-transparent" type="button">
<span class="material-symbols-outlined text-lg" data-icon="lock_open">lock_open</span>
<span>Enterprise SSO</span>
</button>
</div>
</form>
</div>
<div class="flex flex-col items-center space-y-6">
<div class="flex items-center space-x-2 px-4 py-2 bg-tertiary-container/10 rounded-full">
<span class="material-symbols-outlined text-tertiary text-lg" data-icon="verified_user" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="text-tertiary font-bold text-[10px] uppercase tracking-widest">Security verified</span>
</div>
<div class="flex flex-wrap justify-center gap-x-6 gap-y-2 opacity-60">
<div class="flex items-center space-x-1">
<span class="material-symbols-outlined text-[14px]" data-icon="encrypted">encrypted</span>
<span class="text-[10px] font-semibold uppercase tracking-tighter">256-bit AES</span>
</div>
<div class="flex items-center space-x-1">
<span class="material-symbols-outlined text-[14px]" data-icon="shield">shield</span>
<span class="text-[10px] font-semibold uppercase tracking-tighter">Compliant Audit</span>
</div>
</div>
</div>
</main>
<section class="w-full grid grid-cols-2 gap-4">
<div class="h-1 bg-primary/10 rounded-full overflow-hidden">
<div class="h-full bg-primary w-1/3"></div>
</div>
<div class="h-1 bg-primary/5 rounded-full"></div>
</section>
</div>
<div class="fixed inset-0 -z-10 overflow-hidden">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[80px]"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[50%] h-[50%] bg-primary-container/5 rounded-full blur-[100px]"></div>
</div>
</body></html>
