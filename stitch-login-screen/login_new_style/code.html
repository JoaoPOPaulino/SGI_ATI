<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">
<main class="flex-grow flex items-center justify-center px-6 py-10">
<div class="w-full max-w-md">
<!-- Brand Identity Section -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-xl primary-gradient shadow-lg mb-6">
<span class="material-symbols-outlined text-white text-3xl" data-icon="inventory_2">inventory_2</span>
</div>
<h1 class="text-4xl font-extrabold tracking-tighter text-primary font-headline mb-2 uppercase">PatriMove</h1>
<p class="text-on-surface-variant font-medium tracking-tight">Enterprise Asset Management System</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl p-8 shadow-[0_16px_32px_-12px_rgba(25,28,30,0.06)] border border-outline-variant/10">
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1" for="email">Corporate Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-11 pr-4 py-3.5 bg-surface-container-low border-none rounded-xl text-on-surface placeholder:text-outline/60 focus:bg-surface-container-high focus:ring-2 focus:ring-primary/20 transition-all duration-200" id="email" name="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant" for="password">Security Key</label>
<a class="text-[10px] font-bold text-primary hover:text-primary-container transition-colors tracking-tight" href="#">FORGOT ACCESS?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-11 pr-12 py-3.5 bg-surface-container-low border-none rounded-xl text-on-surface placeholder:text-outline/60 focus:bg-surface-container-high focus:ring-2 focus:ring-primary/20 transition-all duration-200" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Actions -->
<div class="pt-2">
<button class="w-full primary-gradient text-on-primary font-bold py-4 px-6 rounded-xl shadow-sm active:scale-[0.98] transition-all duration-150 flex items-center justify-center gap-2 tracking-tight" type="submit">
<span>AUTHORIZE ACCESS</span>
<span class="material-symbols-outlined text-[18px]" data-icon="login">login</span>
</button>
</div>
</form>
<!-- Footer Links inside Card -->
<div class="mt-8 pt-6 border-t border-outline-variant/20 flex flex-col items-center gap-4">
<p class="text-body-sm text-on-surface-variant font-medium text-center">
                        Secure terminal access point. <br/>
                        Unauthorized entry is monitored.
                    </p>
</div>
</div>
<!-- SSO Options -->
<div class="mt-8 text-center">
<p class="text-xs font-bold text-outline uppercase tracking-widest mb-4">Or sign in with</p>
<div class="flex justify-center gap-4">
<button class="flex items-center justify-center w-full py-3 px-4 bg-surface-container-highest/50 hover:bg-surface-container-highest rounded-xl transition-colors border border-outline-variant/10">
<img alt="Google logo" class="w-5 h-5 mr-3" data-alt="clean minimal google brand logo icon for single sign on authentication" src="https://lh3.googleusercontent.com/aida-public/AB6AXuALnai37_ndbnYbp82OMX7dYUHB4Dz_cFC8ZjoM2DO8JhxNIH1FltAMeT25UbP2sQwEnEiAhsbMnGQvDZoU1fKXivgl8KKL-BZ6ZfMEppJBEzGaRI3dxsoYWvh_xrLKtZjRNiOWqTSiQb6g6D8NyZ2fkzqF1s3YswpFwkOjtO9xEaZThxpM4KDnYi6WWsNizdAr0aadNedD27moRKb8YcTxS5nrUAkOU4c7uQxKb4tNDmW8xBnDYk7rdnjaW6VOcCiV49DC6aUJ_kw"/>
<span class="text-xs font-bold text-on-surface uppercase tracking-tight">Enterprise SSO</span>
</button>
</div>
</div>
</div>
</main>
<!-- Footer Security Information -->
<footer class="p-6 text-center">
<div class="flex items-center justify-center gap-2 text-[10px] font-bold text-outline uppercase tracking-[0.2em]">
<span class="material-symbols-outlined text-[14px]" data-icon="verified_user">verified_user</span>
<span>Military Grade Encryption Active</span>
</div>
</footer>

<div class="fixed top-0 right-0 w-1/3 h-screen bg-surface-container-low -z-10 opacity-40"></div>
<div class="fixed bottom-0 left-0 w-64 h-64 bg-primary/5 rounded-full blur-[100px] -z-10"></div>
<div class="fixed top-20 left-20 w-32 h-32 bg-secondary/5 rounded-full blur-[60px] -z-10"></div>
